name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Check Python syntax
        run: |
          python -m py_compile reconradar.py

      - name: Lint with flake8 (errors only, non-blocking style warnings)
        run: |
          flake8 reconradar.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 reconradar.py --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: Verify CLI runs (--help)
        run: |
          python reconradar.py --help
